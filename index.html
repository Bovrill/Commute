<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Commute</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #0a0c0f;
    --panel: #0f1318;
    --border: #1e2530;
    --amber: #f5a623;
    --blue: #38bdf8;
    --tube-red: #e11d48;
    --subtext: #6b7e94;
    --text: #d0dbe8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    padding: 10px;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--subtext);
  }

  #clock {
    font-family: 'Share Tech Mono', monospace;
    font-size: 20px;
    color: var(--amber);
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 14px 0 10px;
  }

  .divider-line { flex: 1; height: 1px; background: var(--border); }

  .divider-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .divider-label.outbound { color: var(--amber); }
  .divider-label.tube     { color: var(--tube-red); }
  .divider-label.inbound  { color: var(--blue); }

  .board-wrap {
    margin-bottom: 8px;
  }

  .board-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--subtext);
    padding: 4px 8px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 4px 4px 0 0;
  }

  .board-label .walk {
    float: right;
    font-weight: 400;
    color: #3a4455;
  }

  iframe {
    width: 100%;
    height: 80px;
    border: 1px solid var(--border);
    border-radius: 0 0 4px 4px;
    display: block;
    background: #000;
  }

  footer {
    margin-top: 16px;
    text-align: center;
    font-size: 10px;
    color: #3a4455;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<header>
  <h1>Commute</h1>
  <div id="clock">--:--:--</div>
</header>

<!-- OUTBOUND -->
<div class="divider">
  <div class="divider-line"></div>
  <div class="divider-label outbound">Outbound</div>
  <div class="divider-line"></div>
</div>

<div class="board-wrap">
  <div class="board-label">Mitcham Eastfields → Victoria <span class="walk">8 min walk</span></div>
  <iframe src="https://www.leddepartureboard.com/MTC/to/VIC/1" scrolling="no" frameborder="0"></iframe>
</div>

<div class="board-wrap">
  <div class="board-label">Mitcham Eastfields → St Pancras <span class="walk">8 min walk</span></div>
  <iframe src="https://www.leddepartureboard.com/MTC/to/STP/1" scrolling="no" frameborder="0"></iframe>
</div>

<div class="board-wrap">
  <div class="board-label">Tooting → St Pancras <span class="walk">12 min walk</span></div>
  <iframe src="https://www.leddepartureboard.com/TOO/to/STP/1" scrolling="no" frameborder="0"></iframe>
</div>

<!-- TUBE -->
<div class="divider">
  <div class="divider-line"></div>
  <div class="divider-label tube">Underground</div>
  <div class="divider-line"></div>
</div>

<div class="board-wrap">
  <div class="board-label">Tooting Broadway → Northbound <span class="walk">12 min walk</span></div>
  <iframe src="https://www.leddepartureboard.com/london-tube/northern/940GZZLUTBC/inbound/1" scrolling="no" frameborder="0"></iframe>
</div>

<!-- INBOUND -->
<div class="divider">
  <div class="divider-line"></div>
  <div class="divider-label inbound">Homeward</div>
  <div class="divider-line"></div>
</div>

<div class="board-wrap">
  <div class="board-label">Farringdon → Mitcham Eastfields</div>
  <iframe src="https://www.leddepartureboard.com/ZFD/to/MTC/1" scrolling="no" frameborder="0"></iframe>
</div>

<div class="board-wrap">
  <div class="board-label">Farringdon → Tooting</div>
  <iframe src="https://www.leddepartureboard.com/ZFD/to/TOO/1" scrolling="no" frameborder="0"></iframe>
</div>

<footer>leddepartureboard.com · auto-refreshes</footer>

<script>
  function pad(n) { return String(n).padStart(2, '0'); }
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
  }
  setInterval(updateClock, 1000);
  updateClock();
</script>

</body>
</html>
